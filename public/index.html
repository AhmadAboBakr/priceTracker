<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UAE Grocery Price Tracker</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
  <header>
    <div class="header-content">
      <h1>UAE Grocery Price Tracker</h1>
      <p class="subtitle">Track grocery price inflation across UAE supermarkets</p>
    </div>
    <div class="controls">
      <a href="/add-prices.html" class="add-prices-link">+ Add Prices</a>
      <a href="/manage-items.html" class="add-prices-link" style="background:rgba(255,255,255,0.15)">Manage Items</a>
      <a href="/manage-stores.html" class="add-prices-link" style="background:rgba(255,255,255,0.15)">Manage Stores</a>
      <button id="dataCleanupBtn" class="add-prices-link" style="background:rgba(139,92,246,0.7);border:none;cursor:pointer" title="Detect and clean anomalous prices and suspicious spikes">Data Cleanup</button>
      <select id="daysFilter">
        <option value="7">Last 7 days</option>
        <option value="30" selected>Last 30 days</option>
        <option value="90">Last 90 days</option>
        <option value="180">Last 6 months</option>
      </select>
      <select id="categoryFilter">
        <option value="all">All Categories</option>
      </select>
    </div>
  </header>

  <main>
    <!-- Summary Stats (dynamically generated) -->
    <section class="stats-row" id="statsRow"></section>

    <!-- Average Price Trend Chart -->
    <section class="chart-section">
      <h2>Price Index (base = 100)</h2>
      <div class="chart-container">
        <canvas id="basketChart"></canvas>
      </div>
    </section>

    <!-- Items Grid -->
    <section class="items-section">
      <h2>Item Prices <span id="itemCount" class="badge"></span></h2>
      <div class="items-grid" id="itemsGrid">
        <p class="loading">Loading items...</p>
      </div>
    </section>

    <!-- Item Detail Modal -->
    <div class="modal-overlay" id="modalOverlay" style="display:none">
      <div class="modal">
        <div class="modal-header">
          <h3 id="modalTitle">Item Details</h3>
          <div style="display:flex;align-items:center;gap:8px">
            <button id="modalDeleteBtn" onclick="deleteCurrentItem()" title="Delete this item" style="background:var(--negative);color:#fff;border:none;border-radius:6px;padding:6px 14px;cursor:pointer;font-size:0.8rem;opacity:0.85;transition:opacity .2s" onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=0.85">Delete Item</button>
            <button class="modal-close" id="modalClose">&times;</button>
          </div>
        </div>
        <div class="chart-container">
          <canvas id="itemChart"></canvas>
        </div>
        <div id="modalInfo" class="modal-info"></div>
      </div>
    </div>
    <!-- Data Cleanup Modal -->
    <div class="modal-overlay" id="cleanupOverlay" style="display:none">
      <div class="modal" style="width:min(95vw,900px)">
        <div class="modal-header">
          <h3>Data Cleanup</h3>
          <button class="modal-close" id="cleanupModalClose">&times;</button>
        </div>
        <!-- Tabs -->
        <div style="display:flex;border-bottom:1px solid var(--border);margin-bottom:12px">
          <button class="cleanup-tab active" data-tab="anomalies" style="flex:1;padding:10px;border:none;background:none;cursor:pointer;font-weight:600;font-size:0.9rem;color:var(--text-secondary);border-bottom:2px solid transparent" onclick="switchCleanupTab('anomalies')">Price Anomalies</button>
          <button class="cleanup-tab" data-tab="spikes" style="flex:1;padding:10px;border:none;background:none;cursor:pointer;font-weight:600;font-size:0.9rem;color:var(--text-secondary);border-bottom:2px solid transparent" onclick="switchCleanupTab('spikes')">Price Spikes</button>
        </div>
        <!-- Anomalies Tab -->
        <div id="anomalyTab">
          <div style="display:flex;align-items:center;gap:16px;padding:0 4px 12px;flex-wrap:wrap">
            <label style="font-size:0.85rem;color:var(--text-secondary);white-space:nowrap">Deviation threshold:</label>
            <input type="range" id="anomalySlider" min="5" max="60" value="20" step="1" style="flex:1;min-width:120px;accent-color:var(--negative)">
            <span id="anomalySliderVal" style="font-weight:600;font-size:0.9rem;min-width:40px">20%</span>
            <button id="removeAllAnomaliesBtn" onclick="removeAllVisibleAnomalies()" style="background:var(--negative);color:#fff;border:none;border-radius:6px;padding:6px 14px;cursor:pointer;font-size:0.8rem;white-space:nowrap">Remove All</button>
          </div>
          <div id="anomalyList" style="max-height:55vh;overflow-y:auto"></div>
        </div>
        <!-- Spikes Tab -->
        <div id="spikesTab" style="display:none">
          <div style="display:flex;align-items:center;gap:16px;padding:0 4px 12px;flex-wrap:wrap">
            <label style="font-size:0.85rem;color:var(--text-secondary);white-space:nowrap">Max AED change:</label>
            <input type="range" id="spikeAedSlider" min="1" max="50" value="5" step="1" style="flex:1;min-width:80px;accent-color:#F59E0B">
            <span id="spikeAedVal" style="font-weight:600;font-size:0.9rem;min-width:50px">AED 5</span>
            <label style="font-size:0.85rem;color:var(--text-secondary);white-space:nowrap;margin-left:8px">Max % change:</label>
            <input type="range" id="spikePctSlider" min="10" max="200" value="50" step="5" style="flex:1;min-width:80px;accent-color:#F59E0B">
            <span id="spikePctVal" style="font-weight:600;font-size:0.9rem;min-width:40px">50%</span>
            <button id="removeAllSpikesBtn" onclick="removeAllVisibleSpikes()" style="background:#F59E0B;color:#fff;border:none;border-radius:6px;padding:6px 14px;cursor:pointer;font-size:0.8rem;white-space:nowrap">Remove All</button>
          </div>
          <div id="spikesList" style="max-height:55vh;overflow-y:auto"></div>
        </div>
      </div>
    </div>
  </main>

  <footer>
    <p>Prices scraped daily at 8:00 AM GST. Data for informational purposes only.</p>
  </footer>

  <script src="dashboard.js"></script>
</body>
</html>
