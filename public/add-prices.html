<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Prices — UAE Grocery Price Tracker</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .page-wrapper { max-width: 1100px; margin: 0 auto; padding: 24px 32px; }
    .back-link {
      display: inline-flex; align-items: center; gap: 6px;
      color: rgba(255,255,255,0.8); text-decoration: none; font-size: 0.875rem; margin-bottom: 8px;
    }
    .back-link:hover { color: white; }
    .nav-links { display: flex; gap: 16px; align-items: center; }
    .nav-btn {
      padding: 8px 18px; border-radius: 8px; font-size: 0.85rem; font-weight: 600;
      text-decoration: none; transition: background 0.2s;
    }
    .nav-btn.manage { background: rgba(255,255,255,0.15); color: white; }
    .nav-btn.manage:hover { background: rgba(255,255,255,0.25); }

    .card {
      background: var(--card-bg); border-radius: var(--radius);
      padding: 24px; box-shadow: var(--shadow); margin-bottom: 20px;
    }
    .card h2 { font-size: 1.1rem; margin-bottom: 16px; display: flex; align-items: center; gap: 10px; }

    .form-row { display: flex; gap: 16px; flex-wrap: wrap; }
    .field { display: flex; flex-direction: column; gap: 4px; }
    .field label {
      font-size: 0.75rem; font-weight: 600; color: var(--text-secondary);
      text-transform: uppercase; letter-spacing: 0.03em;
    }
    .field input, .field select {
      padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px;
      font-size: 0.9rem; color: var(--text); background: white;
    }
    .field input:focus, .field select:focus {
      outline: none; border-color: var(--carrefour-color);
      box-shadow: 0 0 0 3px rgba(0,75,135,0.1);
    }

    /* ── Filter Chips ──────────────────────────────── */
    .filter-chips { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
    .chip {
      padding: 5px 14px; border-radius: 16px; border: 1px solid var(--border);
      background: white; font-size: 0.8rem; cursor: pointer; color: var(--text-secondary);
    }
    .chip:hover { border-color: var(--carrefour-color); color: var(--carrefour-color); }
    .chip.active { background: var(--carrefour-color); color: white; border-color: var(--carrefour-color); }

    /* ── Table ──────────────────────────────────────── */
    .tbl-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
    thead th {
      text-align: left; padding: 10px 12px; font-size: 0.75rem;
      text-transform: uppercase; letter-spacing: 0.05em;
      color: var(--text-secondary); border-bottom: 2px solid var(--border); font-weight: 600;
    }
    thead th.store-th { text-align: center; min-width: 130px; }
    tbody tr { border-bottom: 1px solid var(--border); }
    tbody tr:hover { background: rgba(0,0,0,0.02); }
    td { padding: 8px 12px; vertical-align: middle; }
    .name-cell { font-weight: 500; }
    .cat-tag {
      display: inline-block; font-size: 0.7rem; padding: 2px 8px;
      border-radius: 10px; background: var(--bg); color: var(--text-secondary); font-weight: 500;
    }
    .store-cell { text-align: center; }
    .price-in {
      width: 90px; padding: 6px 8px; border: 1px solid var(--border); border-radius: 6px;
      font-size: 0.85rem; text-align: right; color: var(--text);
    }
    .price-in:focus {
      outline: none; border-color: var(--carrefour-color);
      box-shadow: 0 0 0 2px rgba(0,75,135,0.1);
    }
    .price-in::placeholder { color: #ccc; }
    .last-val { display: block; font-size: 0.7rem; color: var(--text-secondary); margin-top: 2px; }

    /* ── Bottom Bar ─────────────────────────────────── */
    .bottom-bar {
      display: flex; justify-content: space-between; align-items: center;
      margin-top: 20px; flex-wrap: wrap; gap: 12px;
    }
    .count-text { font-size: 0.85rem; color: var(--text-secondary); }
    .count-text strong { color: var(--text); }
    .btn {
      padding: 10px 24px; border: none; border-radius: 8px;
      font-size: 0.9rem; font-weight: 600; cursor: pointer;
    }
    .btn-save {
      background: linear-gradient(135deg, #16a34a, #15803d); color: white;
      padding: 12px 32px; font-size: 0.95rem;
    }
    .btn-save:hover { background: linear-gradient(135deg, #15803d, #166534); }
    .btn-save:disabled { background: #ccc; cursor: not-allowed; }
    .btn-clear {
      background: white; color: var(--text-secondary);
      border: 1px solid var(--border); padding: 8px 16px; font-size: 0.85rem;
    }
    .btn-clear:hover { background: var(--bg); }

    .empty-msg { text-align: center; padding: 32px; color: var(--text-secondary); }
    .empty-msg a { color: var(--carrefour-color); }

    /* ── Toast ──────────────────────────────────────── */
    .toast {
      position: fixed; bottom: 24px; right: 24px; padding: 14px 24px; border-radius: 8px;
      color: white; font-weight: 500; font-size: 0.9rem;
      box-shadow: 0 8px 24px rgba(0,0,0,0.2);
      transform: translateY(100px); opacity: 0; transition: all 0.3s ease; z-index: 2000;
    }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.success { background: #16a34a; }
    .toast.error { background: #dc2626; }

    @media (max-width: 768px) {
      .page-wrapper { padding: 16px; }
      .form-row { flex-direction: column; }
      .price-in { width: 70px; }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-content">
      <a href="/" class="back-link">&larr; Dashboard</a>
      <h1>Add Prices</h1>
      <p class="subtitle">Enter today's prices for all stores</p>
    </div>
    <div class="nav-links">
      <a href="/manage-items.html" class="nav-btn manage">Manage Items</a>
    </div>
  </header>

  <main class="page-wrapper">
    <!-- Date -->
    <div class="card">
      <div class="form-row">
        <div class="field" style="min-width:200px">
          <label for="dateIn">Date</label>
          <input type="date" id="dateIn">
        </div>
      </div>
    </div>

    <!-- Price Table -->
    <div class="card">
      <h2>Prices <span class="badge" id="countBadge">0</span></h2>
      <div class="filter-chips" id="chips"></div>

      <div class="tbl-wrap">
        <table>
          <thead>
            <tr id="headRow">
              <th>Item</th>
              <th>Category</th>
              <!-- store columns inserted by JS -->
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>

      <div class="bottom-bar">
        <div>
          <span class="count-text"><strong id="filledN">0</strong> prices filled</span>
          &nbsp;
          <button class="btn btn-clear" id="btnClear">Clear All</button>
        </div>
        <button class="btn btn-save" id="btnSave" disabled>Save Prices</button>
      </div>
    </div>
  </main>

  <div class="toast" id="toast"></div>

  <script>
    let stores = [];
    let items = [];
    let priceMap = {};
    let activeCat = 'all';

    const dateIn    = document.getElementById('dateIn');
    const headRow   = document.getElementById('headRow');
    const tbody     = document.getElementById('tbody');
    const chips     = document.getElementById('chips');
    const countBadge = document.getElementById('countBadge');
    const filledN   = document.getElementById('filledN');
    const btnSave   = document.getElementById('btnSave');
    const btnClear  = document.getElementById('btnClear');
    const toast     = document.getElementById('toast');

    dateIn.value = new Date().toISOString().slice(0, 10);

    const STORE_DOT = { 'Lulu Hypermarket': 'lulu', 'Carrefour UAE': 'carrefour', 'Union Coop': 'coop' };
    const SHORT = { 'Lulu Hypermarket': 'Lulu', 'Carrefour UAE': 'Carrefour', 'Union Coop': 'Union Coop' };

    // ── Load ──────────────────────────────────────────
    async function load() {
      try {
        const [s, i] = await Promise.all([
          fetch('/api/stores').then(r => r.json()),
          fetch('/api/items').then(r => r.json()),
        ]);
        stores = Array.isArray(s) ? s : [];
        items  = Array.isArray(i) ? i : [];
        console.log('[load]', stores.length, 'stores,', items.length, 'items');
      } catch (e) {
        console.error('[load]', e);
        showToast('Could not load data from server', 'error');
        return;
      }

      // Build price lookup
      priceMap = {};
      for (const item of items) {
        if (!item.prices) continue;
        for (const sid of Object.keys(item.prices)) {
          if (item.prices[sid]) priceMap[`${item.id}-${sid}`] = item.prices[sid].price;
        }
      }

      // Build store column headers
      for (const s of stores) {
        const th = document.createElement('th');
        th.className = 'store-th';
        const dot = STORE_DOT[s.name] || '';
        th.innerHTML = `<span class="store-dot ${dot}"></span> ${SHORT[s.name] || s.name}`;
        headRow.appendChild(th);
      }

      buildChips();
      render();
    }

    function buildChips() {
      const cats = [...new Set(items.map(i => i.category))].sort();
      let h = `<button class="chip ${activeCat === 'all' ? 'active' : ''}" data-c="all">All</button>`;
      for (const c of cats) h += `<button class="chip ${activeCat === c ? 'active' : ''}" data-c="${c}">${c}</button>`;
      chips.innerHTML = h;
    }

    chips.addEventListener('click', e => {
      const b = e.target.closest('.chip');
      if (!b) return;
      activeCat = b.dataset.c;
      chips.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
      b.classList.add('active');
      render();
    });

    // ── Render ────────────────────────────────────────
    function render() {
      const filtered = activeCat === 'all' ? items : items.filter(i => i.category === activeCat);
      countBadge.textContent = filtered.length;

      if (items.length === 0) {
        tbody.innerHTML = `<tr><td colspan="${2 + stores.length}" class="empty-msg">
          No items to price. <a href="/manage-items.html">Add items first</a>.
        </td></tr>`;
        return;
      }

      if (filtered.length === 0) {
        tbody.innerHTML = `<tr><td colspan="${2 + stores.length}" class="empty-msg">
          No items in this category.
        </td></tr>`;
        return;
      }

      // Save existing input values
      const saved = {};
      tbody.querySelectorAll('.price-in').forEach(inp => {
        if (inp.value) saved[inp.dataset.k] = inp.value;
      });

      let html = '';
      for (const item of filtered) {
        html += `<tr>`;
        html += `<td class="name-cell">${item.name}</td>`;
        html += `<td><span class="cat-tag">${item.category}</span></td>`;

        for (const store of stores) {
          const k = `${item.id}-${store.id}`;
          const last = priceMap[k];
          const lastStr = last != null ? Number(last).toFixed(2) : '';
          const val = saved[k] || '';

          html += `<td class="store-cell">
            <input type="number" class="price-in" data-k="${k}" data-i="${item.id}" data-s="${store.id}"
                   placeholder="${lastStr || '0.00'}" step="0.01" min="0" value="${val}">
            ${lastStr ? `<span class="last-val">was ${lastStr}</span>` : ''}
          </td>`;
        }
        html += `</tr>`;
      }

      tbody.innerHTML = html;
      countFilled();

      tbody.querySelectorAll('.price-in').forEach(inp => {
        inp.addEventListener('input', countFilled);
      });
    }

    function countFilled() {
      let n = 0;
      tbody.querySelectorAll('.price-in').forEach(inp => {
        if (inp.value && parseFloat(inp.value) > 0) n++;
      });
      filledN.textContent = n;
      btnSave.disabled = n === 0;
    }

    // ── Clear ─────────────────────────────────────────
    btnClear.addEventListener('click', () => {
      tbody.querySelectorAll('.price-in').forEach(inp => inp.value = '');
      countFilled();
    });

    // ── Save ──────────────────────────────────────────
    btnSave.addEventListener('click', async () => {
      const date = dateIn.value;
      if (!date) { showToast('Pick a date', 'error'); return; }

      const prices = [];
      tbody.querySelectorAll('.price-in').forEach(inp => {
        const v = parseFloat(inp.value);
        if (v > 0) {
          prices.push({
            itemId:  parseInt(inp.dataset.i),
            storeId: parseInt(inp.dataset.s),
            price:   v,
            date:    date + 'T12:00:00.000Z',
          });
        }
      });

      if (!prices.length) { showToast('No prices to save', 'error'); return; }

      btnSave.disabled = true;
      btnSave.textContent = 'Saving...';

      try {
        const res = await fetch('/api/prices', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ prices }),
        });
        const data = await res.json();

        if (res.ok && data.success) {
          showToast(`Saved ${data.inserted} price(s)!`, 'success');

          // Clear saved inputs
          tbody.querySelectorAll('.price-in').forEach(inp => {
            if (parseFloat(inp.value) > 0) inp.value = '';
          });
          countFilled();

          // Refresh price map
          try {
            const fresh = await fetch('/api/items').then(r => r.json());
            items = Array.isArray(fresh) ? fresh : [];
            priceMap = {};
            for (const item of items) {
              if (!item.prices) continue;
              for (const sid of Object.keys(item.prices)) {
                if (item.prices[sid]) priceMap[`${item.id}-${sid}`] = item.prices[sid].price;
              }
            }
            render();
          } catch (e) { /* price map refresh failed, not critical */ }
        } else {
          showToast(data.error || 'Failed to save', 'error');
        }
      } catch (e) {
        console.error('[save]', e);
        showToast('Network error', 'error');
      } finally {
        btnSave.disabled = false;
        btnSave.textContent = 'Save Prices';
      }
    });

    // ── Toast ─────────────────────────────────────────
    function showToast(msg, type) {
      toast.textContent = msg;
      toast.className = `toast ${type} show`;
      setTimeout(() => toast.classList.remove('show'), 3500);
    }

    load();
  </script>
</body>
</html>
